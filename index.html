<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HIS Upload</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 32px 24px;
    width: 100%;
    max-width: 420px;
    text-align: center;
}
.logo { font-size: 48px; margin-bottom: 8px; }
h1 { color: #1a5fa8; font-size: 22px; margin-bottom: 4px; }
.sub { color: #888; font-size: 13px; margin-bottom: 24px; }
.preview-wrap {
    width: 100%; aspect-ratio: 4/3;
    background: #f0f4f8;
    border-radius: 12px;
    border: 2px dashed #c0cfe0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color .2s;
}
.preview-wrap:hover { border-color: #1a5fa8; }
.preview-wrap img { width: 100%; height: 100%; object-fit: contain; }
.preview-placeholder { color: #aaa; font-size: 14px; }
.preview-placeholder span { font-size: 36px; display: block; margin-bottom: 6px; }
input[type=file] { display: none; }
.btn {
    display: block; width: 100%;
    padding: 15px;
    margin: 8px 0;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.98); }
.btn-blue  { background: #1a5fa8; color: #fff; }
.btn-green { background: #1e8a4a; color: #fff; }
.btn-green:disabled { opacity: .35; cursor: not-allowed; transform: none; }
#fn {
    font-size: 12px; color: #666;
    margin: 4px 0 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#st {
    margin-top: 16px; padding: 14px;
    border-radius: 10px; font-size: 14px;
    display: none; line-height: 1.5;
}
.st-loading { background: #fff8e1; color: #7a5700; }
.st-ok      { background: #e6f4ea; color: #1a5c2a; }
.st-err     { background: #fdecea; color: #a32020; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">🏥</div>
    <h1>HIS Upload</h1>
    <p class="sub">Tải ảnh lên hệ thống VNPT HIS</p>

    <div class="preview-wrap" id="previewWrap" onclick="document.getElementById('fi').click()">
        <div class="preview-placeholder" id="ph">
            <span>📷</span>Nhấn để chọn / chụp ảnh
        </div>
        <img id="previewImg" style="display:none">
    </div>

    <input id="fi" type="file" accept="image/*" capture="environment">
    <p id="fn">Chưa chọn ảnh</p>

    <button class="btn btn-blue"  onclick="document.getElementById('fi').click()">Chọn / Chụp ảnh</button>
    <button class="btn btn-green" id="bu" onclick="go()" disabled>⬆️ Upload lên HIS</button>

    <div id="st"></div>
</div>

<script>
var sessionUrl = null;
var file       = null;

/* ── Decode session URL từ ?s= (base64url) ── */
(function init() {
    var s = new URLSearchParams(location.search).get('s');
    if (!s) {
        showErr('❌ Thiếu tham số session. Hãy quét lại mã QR.');
        return;
    }
    /* base64url → base64 chuẩn */
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    try {
        sessionUrl = atob(s);
    } catch (e) {
        showErr('❌ Session URL không hợp lệ. Hãy quét lại mã QR.');
    }
})();

/* ── Chọn ảnh ── */
document.getElementById('fi').onchange = function () {
    file = this.files[0];
    if (!file) return;
    document.getElementById('bu').disabled = false;
    document.getElementById('fn').textContent = file.name;

    /* Preview */
    var reader = new FileReader();
    reader.onload = function (e) {
        var img = document.getElementById('previewImg');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('ph').style.display = 'none';
    };
    reader.readAsDataURL(file);
};

/* ── Upload ── */
async function go() {
    if (!file || !sessionUrl) return;
    var st  = document.getElementById('st');
    var bu  = document.getElementById('bu');
    st.className    = 'st-loading';
    st.style.display = 'block';
    st.textContent  = '⏳ Đang upload…';
    bu.disabled     = true;

    try {
        var r = await fetch(sessionUrl, {
            method : 'PUT',
            headers: {
                'Content-Length': file.size,
                'Content-Range' : 'bytes 0-' + (file.size - 1) + '/' + file.size,
                'Content-Type'  : file.type || 'image/jpeg',
            },
            body: file,
        });

        if (r.ok || r.status === 201) {
            st.className   = 'st-ok';
            st.textContent = '✅ Upload thành công! Quay lại máy tính để xem ảnh.';
        } else {
            st.className   = 'st-err';
            st.textContent = '❌ Lỗi HTTP ' + r.status + '. Hãy thử lại hoặc quét mã QR mới.';
            bu.disabled    = false;
        }
    } catch (e) {
        st.className   = 'st-err';
        st.textContent = '❌ ' + (e.message || e);
        bu.disabled    = false;
    }
}

function showErr(msg) {
    var st = document.getElementById('st');
    st.className    = 'st-err';
    st.style.display = 'block';
    st.textContent  = msg;
    document.getElementById('bu').disabled = true;
}
</script>
</body>
</html>
